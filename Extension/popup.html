<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="pinit-header">
        <img src="pinit-icon-clear.png" alt="Pinit" class="pinit-brand-icon">
        <h1>Pinit</h1>
    </div>

    <div style="padding: 0 16px;">
        <button id="btnPinPage" class="pinit-btn-primary" style="width: 100%; margin-bottom: 8px; padding: 10px; border-radius: 6px; border: none; background: #3498db; color: white; cursor: pointer; font-weight: bold; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.9" onmouseout="this.style.opacity=1">
            📌 Pin Current Page View
        </button>
    </div>

    <div id="pinList" class="pinit-container">
        <!-- Pins will be injected here -->
        <div class="pinit-empty">
            <p>No messages pinned yet.</p>
            <p style="font-size: 11px; margin-top: 8px;">Hover over a message in ChatGPT, Claude, or Grok and click the button.</p>
        </div>
    </div>

    <div class="pinit-footer">
        Powered by Pinit Content-Based Matching
    </div>

    <script src="popup.js"></script>
</body>
</html>
